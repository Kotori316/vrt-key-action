version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
    ignore:
      # Stay on the current Node major (LTS line); bump @types/node major when you move engines/volta.
      - dependency-name: '@types/node'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
